# Wax language + grammar for Helix. Merge into ~/.config/helix/languages.toml.
# See README.md for the full setup (build + query install).

[[language]]
name = "wax"
scope = "source.wax"
file-types = ["wax"]
comment-tokens = ["//"]
block-comment-tokens = { start = "/*", end = "*/" }
indent = { tab-width = 4, unit = "    " }
# The language server gives diagnostics, hover, go-to-definition, references,
# rename, completion, signature help and formatting. `wax` must be on PATH.
language-servers = ["wax"]
# Uses the language server's formatting; drop this line to format on demand
# only. (For a standalone formatter instead, see README.md.)
auto-format = true
grammar = "wax"

# Helix starts this itself, the same way it runs the formatter.
[language-server.wax]
command = "wax"
args = ["lsp"]

[[grammar]]
name = "wax"
# We recommend pointing this at a local checkout so you can copy the queries.
# (A remote works too: source = { git = "https://github.com/ocsigen/wax", rev = "main", subpath = "tree-sitter-wax" })
source = { path = "/path/to/wax/tree-sitter-wax" }
