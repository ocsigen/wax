name: Fuzz (nightly)

# The budgeted stochastic campaign tier: build the corpora and run the
# mutation/generation campaigns (fuzz/nightly.sh). Runs on a schedule (and on
# demand) rather than per-PR — the per-PR deterministic guards are the `fuzz`
# job in ci.yml. A failure means a campaign hit a HIGH-severity finding; the
# inputs are uploaded as an artifact and the run's SEED (in the log) replays it.
on:
  schedule:
    - cron: "27 1 * * *" # daily, 01:27 UTC
  workflow_dispatch:
    inputs:
      smith_count:
        description: "smith.sh modules"
        default: "1000"
      corpus_smith_count:
        description: "Smith-generated modules added to each text seed corpus"
        default: "500"
      mutate_wax_count:
        description: "mutate-wax.sh mutants"
        default: "4000"
      mutate_wat_count:
        description: "mutate-wat.sh mutants"
        default: "6000"
      mutate_wasm_count:
        description: "mutate-wasm.sh MODE=bytes mutants"
        default: "8000"
      mutate_wasm_struct_count:
        description: "mutate-wasm.sh MODE=struct mutants"
        default: "8000"
      exec_wast_count:
        description: "exec.sh .wast files in the nightly behavioural slice"
        default: "64"
      diff_validate_count:
        description: "diff-validate.sh modules"
        default: "3000"

jobs:
  nightly:
    name: Nightly fuzz campaigns
    runs-on: ubuntu-latest
    timeout-minutes: 90
    # github-script needs issue write to file the failure report.
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.4"

      - name: Install dependencies
        run: opam install . --deps-only --with-test

      # Only the executables the campaigns drive — a plain `dune build` builds
      # @all, pulling in wasm_of_ocaml-compiler (main.exe's `wasm` mode) and uucp
      # (the scripts/ unicode-table generator), neither of which is needed.
      - name: Build
        run: opam exec -- dune build src/bin/main.exe src/bin/fuzz_mutate.exe src/bin/fuzz_gen.exe

      - name: Install wasm-tools
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-tools@1.246.2

      # Build the WebAssembly reference interpreter (pinned spec commit) so the
      # REF-driven campaigns — diff-validate, exec-ref, exec-mutate — actually run
      # instead of skipping. Sparse, blobless checkout of just interpreter/; it is
      # stdlib-only, so dune builds it with no extra dependencies. Keep the pinned
      # commit in sync with .github/workflows/ci.yml.
      - name: Build the WebAssembly reference interpreter
        run: |
          git clone --filter=blob:none --sparse --no-checkout \
            https://github.com/WebAssembly/spec.git "$HOME/wasm-spec"
          git -C "$HOME/wasm-spec" sparse-checkout set interpreter
          git -C "$HOME/wasm-spec" checkout d7b37e4170d8315f2f1283aed4e8076591a9a333
          opam exec -- dune build --root "$HOME/wasm-spec/interpreter" wasm.exe
          echo "REF=$HOME/wasm-spec/interpreter/_build/default/wasm.exe" \
            >> "$GITHUB_ENV"

      # node (for the byte-mutation mode of mutate-wasm) is preinstalled on the
      # ubuntu runner. SEED is left unset so each night explores fresh inputs;
      # the chosen value is logged for replay.
      - name: Run nightly fuzz campaigns
        id: campaign
        run: opam exec -- bash fuzz/nightly.sh
        env:
          SMITH_COUNT: ${{ github.event.inputs.smith_count || '1000' }}
          CORPUS_SMITH_COUNT: ${{ github.event.inputs.corpus_smith_count || '500' }}
          MUTATE_WAX_COUNT: ${{ github.event.inputs.mutate_wax_count || '4000' }}
          MUTATE_WAT_COUNT: ${{ github.event.inputs.mutate_wat_count || '6000' }}
          MUTATE_WASM_COUNT: ${{ github.event.inputs.mutate_wasm_count || '8000' }}
          MUTATE_WASM_STRUCT_COUNT: ${{ github.event.inputs.mutate_wasm_struct_count || '8000' }}
          EXEC_WAST_COUNT: ${{ github.event.inputs.exec_wast_count || '64' }}
          DIFF_VALIDATE_COUNT: ${{ github.event.inputs.diff_validate_count || '3000' }}

      # A campaign that found something saved its (re-verified) inputs here.
      - name: Upload findings
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-findings
          path: fuzz/*-findings/
          if-no-files-found: ignore

      # A repo-visible failure signal that does not depend on personal
      # notification settings: file (or comment on) a `nightly-fuzz` issue. This
      # is on top of GitHub's built-in email to the workflow's last committer.
      # Gated on the campaign step itself failing (a HIGH-severity finding): a
      # setup/build breakage means the campaign never ran, which is an
      # infrastructure problem, not a fuzz finding, so it must not file an issue.
      - name: Report failure as an issue
        if: failure() && steps.campaign.outcome == 'failure'
        uses: actions/github-script@v9
        with:
          script: |
            const run = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `The scheduled fuzz campaign failed.`,
              ``,
              `- Run log: ${run}`,
              `- Failing inputs: the run's \`fuzz-findings\` artifact.`,
              `- Replay locally with the SEED printed near the top of the log: \`SEED=<n> fuzz/nightly.sh\`.`,
            ].join('\n');
            const q = { owner: context.repo.owner, repo: context.repo.repo };
            const issues = await github.rest.issues.listForRepo({ ...q, state: 'all', labels: 'nightly-fuzz' });
            if (issues.data.length > 0) {
              const issue_number = issues.data[0].number;
              if (issues.data[0].state === 'closed') {
                await github.rest.issues.update({ ...q, issue_number, state: 'open' });
              }
              await github.rest.issues.createComment({ ...q, issue_number, body });
            } else {
              await github.rest.issues.create({ ...q, title: 'Nightly fuzz run failed', labels: ['nightly-fuzz'], body });
            }
