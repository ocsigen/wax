name: npm package

# Build the npm distribution of the Wax CLI, prove it works, and publish it. The
# package is a single, cross-platform wasm_of_ocaml artifact (one .wasm module +
# a shebang'd loader as the `wax` bin): it is built once on Linux and then
# installed and run on Linux, macOS and Windows Node, since the artifact is
# identical on every OS.
#
# Pushing a version tag (e.g. `v0.1.0`) builds, tests across the matrix, then
# publishes to npm. Pushes to main, pull requests and manual runs build and test
# only.
#
# Authentication is npm trusted publishing (OIDC): no NPM_TOKEN secret — the
# publish job's `id-token: write` permission lets `npm publish` exchange a
# short-lived GitHub token for npm credentials, with provenance attached
# automatically. Configure a trusted publisher for `@wax-wasm/wax` on npmjs.com,
# pointing at this repo and workflow file (npm-package.yml). Requires a public
# repository and npm >= 11.5.1 (installed in the publish job).

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build package (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.4"

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22"

      - name: Set up Binaryen
        # Required by wasm_of_ocaml (wasm-opt/wasm-merge); same action and
        # version js_of_ocaml's own CI uses. `token` avoids GitHub API rate
        # limits when fetching the Binaryen release.
        uses: Aandreba/setup-binaryen@v1
        with:
          token: ${{ github.token }}

      - name: Install dependencies
        run: |
          # Temporary: dune 3.24.0 breaks wasm_of_ocaml 9.4, so hold dune at
          # 3.23.1 for the wasm_of_ocaml build.
          opam pin add --yes --no-action dune 3.23.1
          opam install . --deps-only
          opam install wasm_of_ocaml-compiler

      - name: Determine version
        id: ver
        shell: bash
        # On a version tag, stamp the package with the tag (v1.2.3 -> 1.2.3);
        # otherwise leave npm/package.json's version as-is (build/test only).
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and assemble the package
        run: opam exec -- npm/build.sh ${{ steps.ver.outputs.version }}

      - name: Pack
        run: cd npm && npm pack

      - name: Upload package tarball
        uses: actions/upload-artifact@v7
        with:
          name: npm-package
          path: npm/*.tgz

  run:
    name: Run (${{ matrix.os }}, Node ${{ matrix.node }})
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ["22", "24"]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Download package tarball
        uses: actions/download-artifact@v8
        with:
          name: npm-package

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}

      - name: Install the tarball globally and run the CLI
        shell: bash
        run: |
          npm install -g ./*.tgz
          wax --help
          printf 'fn sq(x: i32) -> i32 { x * x; }\n' > t.wax
          wax -i wax -f wat t.wax
          wax -i wax -f wasm t.wax -o t.wasm
          wax -i wasm -f wat t.wasm

  publish:
    name: Publish to npm
    needs: [build, run]
    # Only on a version-tag push; branch pushes, pull requests and manual runs
    # stop after build + test.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # for trusted publishing (OIDC) + provenance
    steps:
      - name: Download package tarball
        uses: actions/download-artifact@v8
        with:
          name: npm-package

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      # Node 22 ships an npm older than the 11.5.1 that supports trusted
      # publishing; upgrade before publishing.
      - name: Upgrade npm
        run: npm install -g npm@latest

      # Trusted publishing authenticates via OIDC (no token) and attaches
      # provenance automatically.
      - name: Publish
        run: npm publish ./*.tgz --access public
