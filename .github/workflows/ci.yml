name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.4"

      # Pinned to match the version in .ocamlformat so the check is reproducible.
      - name: Install ocamlformat
        run: opam install ocamlformat.0.29.0

      - name: Check formatting
        run: opam exec -- dune build @fmt

  build:
    name: "Build${{ (matrix.ocaml-compiler != '4.14' && matrix.os != 'windows-latest') && ' & test' || '' }} (${{ matrix.os }}, OCaml ${{ matrix.ocaml-compiler }})"
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        ocaml-compiler:
          - "4.14"
          - "5.4"
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up OCaml ${{ matrix.ocaml-compiler }}
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ matrix.ocaml-compiler }}

      - name: Install dependencies
        run: opam install . --deps-only --with-test

      # Build and install like a user would, which also exercises the install
      # path itself.
      - name: Build
        run: opam install .

      # Skip the suite where it cannot run: on OCaml 4.14 (run_wasm_testsuite
      # uses Domain, 5.0+) and on Windows (it uses Unix.fork and the cram tests
      # assume a POSIX shell, e.g. /dev/null). Those cells are a build-only
      # check.
      - name: Run tests
        if: matrix.ocaml-compiler != '4.14' && matrix.os != 'windows-latest'
        run: opam exec -- dune runtest

  web:
    name: Web extension test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.4"

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22"

      - name: Set up Binaryen
        # wasm_of_ocaml needs Binaryen (wasm-opt/wasm-merge) to build the wasm
        # runtime; same action and version as the npm-package workflow.
        uses: Aandreba/setup-binaryen@v1.0.0
        with:
          token: ${{ github.token }}

      - name: Install dependencies
        run: |
          opam install . --deps-only
          opam install js_of_ocaml js_of_ocaml-ppx wasm_of_ocaml-compiler

      - name: Install extension dependencies
        working-directory: editors/vscode
        run: npm install

      # @vscode/test-web runs the extension in headless Chromium (the same stack
      # as vscode.dev). npm install fetches the browser via @playwright/
      # browser-chromium; this installs the system libraries it needs.
      - name: Install Playwright system dependencies
        working-directory: editors/vscode
        run: npx --yes playwright install-deps chromium

      # `npm run test:web` builds the wasm runtime (dune, hence opam exec),
      # bundles the extension and its test, and runs the smoke test in Chromium.
      - name: Build and run the web smoke test
        run: opam exec -- npm --prefix editors/vscode run test:web

  fuzz:
    name: Fuzz guards
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.4"

      - name: Install dependencies
        run: opam install . --deps-only --with-test

      # Build only the executables the guards drive — a plain `dune build` builds
      # @all, which pulls in wasm_of_ocaml-compiler (main.exe's `wasm` mode) and
      # uucp (the scripts/ unicode-table generator), neither of which is needed.
      - name: Build
        run: opam exec -- dune build src/bin/main.exe src/bin/fuzz_gen.exe

      # The guards diff wax against the reference validator; one whose wasm-tools
      # dependency is absent SKIPS rather than fails, but install it so they run.
      - name: Install wasm-tools
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-tools@1.246.2

      # fuzz/check.sh runs every deterministic guard at a fixed SEED and modest
      # budget, exiting non-zero on any HIGH-severity finding. Guards needing the
      # generated corpus (build-corpus.sh) SKIP here — those, and the stochastic
      # mutation campaigns, are the separate nightly tier. Set QUICK=1 to shrink
      # the budgets further.
      - name: Run deterministic fuzz guards
        run: opam exec -- bash fuzz/check.sh
