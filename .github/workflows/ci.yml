name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.4"

      # Pinned to match the version in .ocamlformat so the check is reproducible.
      - name: Install ocamlformat
        run: opam install ocamlformat.0.29.0

      - name: Check formatting
        run: opam exec -- dune build @fmt

  build:
    name: "Build${{ (matrix.ocaml-compiler != '4.14' && matrix.os != 'windows-latest') && ' & test' || '' }} (${{ matrix.os }}, OCaml ${{ matrix.ocaml-compiler }})"
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        ocaml-compiler:
          - "4.14"
          - "5.4"
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up OCaml ${{ matrix.ocaml-compiler }}
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ matrix.ocaml-compiler }}

      - name: Install dependencies
        run: opam install . --deps-only --with-test

      # Build and install like a user would, which also exercises the install
      # path itself.
      - name: Build
        run: opam install .

      # Skip the suite where it cannot run: on OCaml 4.14 (run_wasm_testsuite
      # uses Domain, 5.0+) and on Windows (it uses Unix.fork and the cram tests
      # assume a POSIX shell, e.g. /dev/null). Those cells are a build-only
      # check.
      - name: Run tests
        if: matrix.ocaml-compiler != '4.14' && matrix.os != 'windows-latest'
        run: opam exec -- dune runtest

  fuzz:
    name: Fuzz guards
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.4"

      - name: Install dependencies
        run: opam install . --deps-only --with-test

      - name: Build
        run: opam exec -- dune build

      # The guards diff wax against the reference validator; one whose wasm-tools
      # dependency is absent SKIPS rather than fails, but install it so they run.
      - name: Install wasm-tools
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-tools@1.246.2

      # fuzz/check.sh runs every deterministic guard at a fixed SEED and modest
      # budget, exiting non-zero on any HIGH-severity finding. Guards needing the
      # generated corpus (build-corpus.sh) SKIP here — those, and the stochastic
      # mutation campaigns, are the separate nightly tier. Set QUICK=1 to shrink
      # the budgets further.
      - name: Run deterministic fuzz guards
        run: opam exec -- bash fuzz/check.sh
