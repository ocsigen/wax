version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directories:
      - "/npm"
      - "/tree-sitter-wax"
      - "/editors/vscode"
      - "/docs/tools/wax-highlight"
    schedule:
      interval: "weekly"
    groups:
      # Bundle low-risk updates into one PR; majors get their own PR each.
      npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # engines.vscode pins the minimum supported API, so bumping the
      # @types/vscode floor is intentional, not a Dependabot chore.
      - dependency-name: "@types/vscode"
